# Dependabot will run on day 26 of each month at 01:35 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      day: 5
      timezone: "Europe/Berlin"
      cronjob: "35 1 26 * *"
    open-pull-requests-limit: 15
    assignees:
      - "JR-Home"
    versioning-strategy: "increase"
    cooldown:
      default: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      day: 5
      timezone: "Europe/Berlin"
      cronjob: "35 1 26 * *"
    open-pull-requests-limit: 15
    assignees:
      - "JR-Home"
